name: Native Installer Freshness

# Keeps the Beta native-installer lane in lockstep with the engine
# release lane. When semantic-release publishes an engine release (v*), this
# workflow synchronizes the native version sources to the same X.Y.Z and pushes
# the matching desktop-vX.Y.Z tag. The existing Native Installer Release
# workflow then builds, smoke-tests, checksums, attests, and drafts the
# prerelease exactly as before — no signing, checksum, or provenance gate is
# bypassed here.
#
# ADMIN_TOKEN (PAT with repo scope) is required for two reasons: main is
# protected, and refs pushed with the default GITHUB_TOKEN do not trigger
# downstream workflows, so the desktop-v* tag must be pushed with a PAT for
# the native release workflow to fire.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Current engine version to build installers for (X.Y.Z; a leading v is stripped)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: native-freshness
  cancel-in-progress: false

jobs:
  sync-native-version:
    name: Sync native version and push desktop tag
    runs-on: ubuntu-22.04
    # Engine releases only: never re-trigger on desktop-v* prereleases (their
    # tags do not start with a bare "v") or on drafts.
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (startsWith(github.event.release.tag_name, 'v') &&
       !github.event.release.prerelease &&
       !github.event.release.draft)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.ADMIN_TOKEN }}

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Resolve target native version
        id: version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            version="${INPUT_VERSION#v}"
          else
            version="${RELEASE_TAG#v}"
          fi
          if ! printf '%s' "${version}" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "error: refusing non X.Y.Z version: ${version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=desktop-v${version}" >> "${GITHUB_OUTPUT}"

      - name: Skip when the native tag already exists
        id: guard
        env:
          NATIVE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/${NATIVE_TAG}" >/dev/null; then
            echo "exists=true" >> "${GITHUB_OUTPUT}"
            echo "${NATIVE_TAG} already exists; nothing to do."
          else
            echo "exists=false" >> "${GITHUB_OUTPUT}"
          fi

      - name: Require exact engine-release application sources
        if: steps.guard.outputs.exists == 'false'
        env:
          NATIVE_VERSION: ${{ steps.version.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          engine_commit="$(
            git rev-parse --verify "refs/tags/v${NATIVE_VERSION}^{commit}"
          )" || {
            echo "error: matching engine tag v${NATIVE_VERSION} does not exist" >&2
            exit 1
          }
          if ! git merge-base --is-ancestor "${engine_commit}" HEAD; then
            echo "error: v${NATIVE_VERSION} is not an ancestor of current main" >&2
            exit 1
          fi
          EXPECTED_VERSION="${NATIVE_VERSION}" python - <<'PY'
          import os

          from scripts.check_release_consistency import release_versions

          expected = os.environ["EXPECTED_VERSION"]
          versions = release_versions()
          if set(versions.values()) != {expected}:
              raise SystemExit(
                  f"current engine sources do not match {expected}: {versions}"
              )
          PY
          protected_paths=(
            engine
            src
            src-tauri/src
            pyproject.toml
            uv.lock
            package.json
            package-lock.json
            src-tauri/Cargo.toml
            src-tauri/Cargo.lock
            src-tauri/tauri.conf.json
          )
          if ! git diff --quiet "${engine_commit}..HEAD" -- "${protected_paths[@]}"; then
            echo "error: application sources advanced after v${NATIVE_VERSION};" >&2
            echo "refusing to publish newer code under an older native tag" >&2
            git diff --name-only "${engine_commit}..HEAD" -- "${protected_paths[@]}" >&2
            exit 1
          fi

      - name: Sync native version sources and lockfiles
        if: steps.guard.outputs.exists == 'false'
        env:
          NATIVE_VERSION: ${{ steps.version.outputs.version }}
        run: python scripts/native_release.py set-version "${NATIVE_VERSION}"

      - name: Commit the sync, tag desktop-v*, and push
        if: steps.guard.outputs.exists == 'false'
        env:
          NATIVE_VERSION: ${{ steps.version.outputs.version }}
          NATIVE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json \
            src-tauri/Cargo.toml src-tauri/Cargo.lock src-tauri/tauri.conf.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(native): sync native installer version to ${NATIVE_VERSION}"
            git tag "${NATIVE_TAG}"
            # Keep main and its matching immutable tag all-or-nothing. A
            # transient failure must not strand an untagged version-sync
            # commit that a retry would have to reinterpret.
            git push --atomic origin HEAD:main "refs/tags/${NATIVE_TAG}"
          else
            git tag "${NATIVE_TAG}"
            git push origin "refs/tags/${NATIVE_TAG}"
          fi

  supersede-published-native:
    name: Mark older native prereleases superseded
    # Keep the last published installer valid while its replacement is still a
    # draft. This job runs only after a marked native prerelease is published
    # and therefore publicly available.
    if: >-
      github.event_name == 'release' &&
      startsWith(github.event.release.tag_name, 'desktop-v') &&
      github.event.release.prerelease &&
      !github.event.release.draft &&
      contains(github.event.release.body, '<!-- installer-release -->')
    runs-on: ubuntu-22.04
    # No `environment:` gate: this job only runs AFTER a maintainer has already
    # published (un-drafted) a native prerelease -- the publish decision is made.
    # It just prepends a reversible "superseded" notice to OLDER prereleases, so a
    # second manual approval added no protection and stalled the freshness pipeline
    # (a pending approval held the `native-freshness` concurrency lock, blocking
    # later native releases). Running it automatically resolves that.
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Edits release notes only. Never deletes releases or assets: removal
      # stays a human decision made outside CI.
      - name: Prepend a superseded notice to older native prereleases
        env:
          NEWER_TAG: ${{ github.event.release.tag_name }}
        shell: bash
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq '.[] | select(.draft == false and .prerelease == true)
                  | select(.tag_name | startswith("desktop-v")) | .tag_name' \
            > native-tags.txt
          while IFS= read -r tag; do
            if [ -z "${tag}" ] || [ "${tag}" = "${NEWER_TAG}" ]; then
              continue
            fi
            gh release view "${tag}" --json body --jq .body > candidate-notes.md
            result="$(python scripts/native_release.py supersede-notes \
              --newer-tag "${NEWER_TAG}" \
              --candidate-tag "${tag}" \
              --notes-file candidate-notes.md \
              --output superseded-notes.md \
              --repo "${GITHUB_REPOSITORY}")"
            echo "${tag}: ${result}"
            if [ "${result}" = "update" ]; then
              gh release edit "${tag}" --notes-file superseded-notes.md
            fi
          done < native-tags.txt
