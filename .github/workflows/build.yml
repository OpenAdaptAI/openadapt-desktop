name: Build artifacts

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: artifacts-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-distribution:
    name: Python distribution
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Build wheel and source distribution
        run: uv build --wheel --sdist

      - name: Upload Python distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-distribution
          path: dist/openadapt_desktop-*
          if-no-files-found: error

  python-sidecar:
    name: Python sidecar (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install locked sidecar dependencies
        run: uv sync --locked --extra build

      - name: Build platform-native sidecar
        run: >-
          uv run pyinstaller --clean --noconfirm --onefile
          --name openadapt-engine engine/__main__.py

      - name: Smoke-test sidecar executable
        run: uv run python scripts/verify_build_artifact.py sidecar

      - name: Upload sidecar executable
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-sidecar-${{ runner.os }}-${{ runner.arch }}
          path: dist/openadapt-engine*
          if-no-files-found: error

  tauri-shell:
    name: Unsigned Tauri shell (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, macos-14, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libwebkit2gtk-4.1-dev

      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: "1.97.0"
          components: rustfmt

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check

      - name: Build release-mode Tauri shell
        run: cargo build --release --locked --manifest-path src-tauri/Cargo.toml

      - name: Verify Tauri shell artifact
        run: python scripts/verify_build_artifact.py tauri

      - name: Upload unsigned Tauri shell
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: tauri-shell-${{ runner.os }}-${{ runner.arch }}
          path: src-tauri/target/release/openadapt-desktop*
          if-no-files-found: error
